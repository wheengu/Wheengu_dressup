<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>흰구 꾸미기</title>
  <meta name="description" content="귀여운 캐릭터 wheen_gu를 배경, 의상, 소품으로 꾸미는 웹 게임입니다." />
  <meta property="og:title" content="흰구 꾸미기" />
  <meta property="og:description" content="wheen_gu를 직접 꾸미고 PNG로 저장해보세요." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="main.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&display=swap");
    :root {
      --ink: #28231f;
      --paper: #fffdf8;
      --accent: #7b61ff;
      --accent-soft: #eee9ff;
      --shadow: rgba(40, 35, 31, 0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Gaegu", system-ui, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
      font-size: 18px;
      line-height: 1.24;
      color: var(--ink);
      background: #f8f2e8;
    }
    button { font: inherit; }
    .app {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 16px;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 430px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }
    .panel {
      background: rgba(255, 253, 248, 0.94);
      border: 3px solid var(--ink);
      border-radius: 28px;
      box-shadow: 7px 7px 0 rgba(40, 35, 31, 0.12);
    }
    .preview-panel { padding: 14px; }
    .stage-wrap {
      position: relative;
      width: 100%;
      border: 3px solid var(--ink);
      border-radius: 24px;
      overflow: hidden;
      background: #fff;
    }
    #avatarSvg {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 1580 / 2270;
      background: #fffdf8;
      touch-action: none;
    }
    .speaker-btn {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 50;
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 253, 248, 0.88);
      color: var(--ink);
      display: grid;
      place-items: center;
      cursor: pointer;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .speaker-btn svg { width: 21px; height: 21px; fill: currentColor; display: block; }
    .speaker-btn.is-playing { background: rgba(40, 35, 31, 0.86); color: #fffdf8; }
    .delete-zone {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 40;
      height: 74px;
      border-radius: 22px;
      background: rgba(40, 35, 31, 0.72);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 21px;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.14s ease, transform 0.14s ease, background 0.14s ease;
      pointer-events: none;
    }
    .delete-zone.show { opacity: 1; transform: translateY(0); }
    .delete-zone.hot { background: rgba(226, 74, 74, 0.92); }
    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }
    .action-btn, .tab, .item-btn {
      border: 2px solid var(--ink);
      color: var(--ink);
      background: #fff;
      cursor: pointer;
      font-weight: 700;
    }
    .action-btn {
      border-radius: 999px;
      padding: 11px 8px 10px;
      box-shadow: 3px 3px 0 var(--ink);
      font-size: 18px;
      line-height: 1.05;
      white-space: nowrap;
    }
    .control-panel { padding: 14px; }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 13px;
    }
    .tab {
      padding: 10px 13px 9px;
      border-radius: 999px;
      box-shadow: 2px 2px 0 var(--ink);
      font-size: 17px;
      line-height: 1.05;
      white-space: nowrap;
    }
    .tab[aria-selected="true"] {
      color: #fff;
      background: var(--ink);
      box-shadow: none;
    }
    .items {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 9px;
    }
    .item-btn {
      position: relative;
      display: grid;
      place-items: center;
      aspect-ratio: 1 / 1;
      padding: 6px;
      border-radius: 18px;
      overflow: hidden;
      background: #fffdf8;
    }
    .item-btn.active {
      background: var(--accent-soft);
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }
    .item-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }
    .background-thumb img {
      object-fit: cover;
      border-radius: 12px;
    }

    .start-screen {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 28px;
      background:
        radial-gradient(circle at 24% 22%, rgba(255, 246, 188, 0.95), transparent 30%),
        radial-gradient(circle at 78% 18%, rgba(238, 232, 255, 0.95), transparent 32%),
        radial-gradient(circle at 54% 76%, rgba(222, 236, 216, 0.95), transparent 34%),
        #fff8e8;
      color: var(--ink);
      transition: opacity 0.28s ease, transform 0.28s ease, visibility 0.28s ease;
    }
    body.game-started .start-screen {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(-10px);
    }
    .start-card {
      display: grid;
      justify-items: center;
      gap: 14px;
      width: min(420px, 100%);
      padding: 34px 24px 30px;
      border: 3px solid var(--ink);
      border-radius: 34px;
      background: rgba(255, 253, 248, 0.90);
      box-shadow: 8px 8px 0 rgba(40, 35, 31, 0.12);
      text-align: center;
    }
    .start-title {
      margin: 0;
      font-size: clamp(52px, 14vw, 90px);
      line-height: 0.92;
      font-weight: 700;
      letter-spacing: -0.04em;
    }
    .start-button {
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: var(--ink);
      color: #fffdf8;
      padding: 12px 26px 11px;
      min-width: 158px;
      box-shadow: 4px 4px 0 rgba(40, 35, 31, 0.18);
      cursor: pointer;
      font-size: 26px;
      font-weight: 700;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .start-button:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 rgba(40, 35, 31, 0.18); }
    .instagram-link {
      position: fixed;
      left: 18px;
      bottom: 18px;
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border: 3px solid var(--ink);
      border-radius: 16px;
      color: var(--ink);
      background: rgba(255, 253, 248, 0.82);
      text-decoration: none;
      box-shadow: 4px 4px 0 rgba(40, 35, 31, 0.12);
      -webkit-tap-highlight-color: transparent;
    }
    .instagram-link svg { width: 25px; height: 25px; display: block; }
    .game-instagram-link {
      position: absolute;
      left: 12px;
      bottom: 12px;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      z-index: 35;
      transition: opacity 0.22s ease, transform 0.22s ease, visibility 0.22s ease;
      transform: translateY(6px);
    }
    body.game-started .game-instagram-link {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0);
    }

    .game-app { transition: opacity 0.24s ease, transform 0.24s ease; }
    body:not(.game-started) .game-app {
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      user-select: none;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      max-width: calc(100vw - 40px);
      border-radius: 999px;
      background: var(--ink);
      color: #fff;
      padding: 10px 14px;
      font-weight: 700;
      font-size: 21px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.16s ease, transform 0.16s ease;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
    .draggable-layer { cursor: grab; touch-action: none; }
    @media (max-width: 840px) {
      .layout { grid-template-columns: 1fr; }
      .actions {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 7px;
      }
    }
    @media (max-width: 460px) {
      body { font-size: 18px; }
      .app { padding: 10px; }
      .preview-panel, .control-panel { padding: 10px; }
      .actions { gap: 6px; margin-top: 10px; }
      .action-btn { font-size: 17px; padding: 10px 4px 9px; box-shadow: 2px 2px 0 var(--ink); }
      .items { gap: 7px; }
      .tab { font-size: 16px; padding: 9px 10px 8px; }
      .start-button { font-size: 25px; }
    }
  </style>
</head>
<body>
  <div class="start-screen" id="startScreen" aria-label="시작 화면">
    <div class="start-card">
      <h1 class="start-title">흰구 꾸미기</h1>
      <button class="start-button" id="startGameBtn" type="button">꾸미러가기</button>
    </div>
    <a class="instagram-link" href="https://www.instagram.com/wheen_gu" target="_blank" rel="noopener" aria-label="wheen_gu 인스타그램 열기">
      <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3.4" y="3.4" width="17.2" height="17.2" rx="5.2"></rect>
        <circle cx="12" cy="12" r="4.1"></circle>
        <circle cx="17.3" cy="6.9" r="0.8" fill="currentColor" stroke="none"></circle>
      </svg>
    </a>
  </div>
  <main class="app game-app" id="gameApp">
    <div class="layout">
      <section class="panel preview-panel" aria-label="흰구 미리보기">
        <div class="stage-wrap" id="stageWrap">
          <button class="speaker-btn" id="speakerBtn" type="button" aria-label="배경음악 켜기">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path id="speakerIconPath" d="M4 9v6h4l5 4V5L8 9H4zm12.4 1.1-1.4 1.4 1.4 1.4-1.4 1.4 1.4 1.4 1.4-1.4 1.4 1.4 1.4-1.4-1.4-1.4 1.4-1.4-1.4-1.4-1.4 1.4-1.4-1.4z"/></svg>
          </button>
          <a class="instagram-link game-instagram-link" href="https://www.instagram.com/wheen_gu" target="_blank" rel="noopener" aria-label="wheen_gu 인스타그램 열기">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3.4" y="3.4" width="17.2" height="17.2" rx="5.2"></rect>
          <circle cx="12" cy="12" r="4.1"></circle>
          <circle cx="17.3" cy="6.9" r="0.8" fill="currentColor" stroke="none"></circle>
          </svg>
          </a>
          <div class="delete-zone" id="deleteZone">삭제</div>
          <svg id="avatarSvg" viewBox="0 0 1580 2270" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="wheen_gu 꾸미기 미리보기">
            <g id="backgroundLayer"></g>
            <image id="baseCharacter" href="assets/embedded/img_001.png" x="0" y="0" width="1580" height="2270" preserveAspectRatio="xMidYMid meet" />
            <g id="wearableLayerRoot"></g>
          </svg>
        </div>
        <div class="actions">
          <button class="action-btn" id="randomBtn" type="button">랜덤</button>
          <button class="action-btn" id="resetBtn" type="button">초기화</button>
          <button class="action-btn" id="downloadBtn" type="button">저장</button>
        </div>
      </section>
      <section class="panel control-panel" aria-label="항목 선택">
        <nav class="tabs" id="tabs" aria-label="카테고리"></nav>
        <div class="items" id="items"></div>
      </section>
    </div>
  </main>
  <audio id="bgmAudio" loop preload="auto" playsinline src="assets/embedded/audio_002.mp3"></audio>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

    function getSfxContext() {

      if (!AudioContextClass) return null;

      return sfxAudioContext;
    }

    function playClickSfx() {
      const ctx = getSfxContext();
      if (!ctx) return;
      const now = ctx.currentTime;
      const master = ctx.createGain();
      master.gain.setValueAtTime(0.0001, now);
      master.gain.exponentialRampToValueAtTime(0.12, now + 0.012);
      master.gain.exponentialRampToValueAtTime(0.0001, now + 0.13);
      master.connect(ctx.destination);

      const oscA = ctx.createOscillator();
      oscA.type = "sine";
      oscA.frequency.setValueAtTime(880, now);
      oscA.frequency.exponentialRampToValueAtTime(1320, now + 0.055);
      oscA.connect(master);
      oscA.start(now);
      oscA.stop(now + 0.135);

      const oscB = ctx.createOscillator();
      oscB.type = "triangle";
      oscB.frequency.setValueAtTime(1760, now + 0.018);
      oscB.frequency.exponentialRampToValueAtTime(2093, now + 0.09);
      const tiny = ctx.createGain();
      tiny.gain.setValueAtTime(0.04, now + 0.018);
      tiny.gain.exponentialRampToValueAtTime(0.0001, now + 0.11);
      oscB.connect(tiny).connect(ctx.destination);
      oscB.start(now + 0.018);
      oscB.stop(now + 0.115);

      return BACKGROUNDS.find(bg => bg.id === id) || BACKGROUNDS[0];
    }

    function createInstance(category, itemId) {
      const item = getItem(category, itemId);
      if (!item || item.id === "none") return null;
      return {
        uid: `item_${uidCounter++}`,
        category,
        itemId,
        dx: 0,
        dy: 0,
        createdAt: uidCounter
      };
    }

    function removeInstancesByCategory(category) {
      state.instances = state.instances.filter(inst => inst.category !== category);
      if (state.activeInstanceId && !state.instances.some(inst => inst.uid === state.activeInstanceId)) {
        state.activeInstanceId = null;
      }
    }

    function removeInstance(uid) {
      const inst = state.instances.find(item => item.uid === uid);
      state.instances = state.instances.filter(item => item.uid !== uid);
      if (inst && inst.category !== "accessory") {
        state.selected[inst.category] = "none";
      }
      if (state.activeInstanceId === uid) state.activeInstanceId = null;
      renderAll();
    }

    function sortedInstances() {
      return [...state.instances].sort((a, b) => {
        const orderDiff = DRAW_ORDER.indexOf(a.category) - DRAW_ORDER.indexOf(b.category);
        if (orderDiff !== 0) return orderDiff;
        return a.createdAt - b.createdAt;
      });
    }

    function renderBackground() {
      const bg = getBackground(state.selectedBackground);
      if (!bg) {
        backgroundLayer.innerHTML = `<rect width="1580" height="2270" fill="#fff8e8" />`;
        return;
      }
      if (bg.src) {
        backgroundLayer.innerHTML = `<image href="${bg.src}" x="0" y="0" width="1580" height="2270" preserveAspectRatio="xMidYMid slice" />`;
      } else {
        backgroundLayer.innerHTML = `<rect width="1580" height="2270" fill="${bg.color || '#fff8e8'}" />`;
      }
    }

    function renderStage() {
      renderBackground();
      wearableLayerRoot.innerHTML = "";
      sortedInstances().forEach(inst => {
        const item = getItem(inst.category, inst.itemId);
        if (!item || !item.src) return;
        const group = document.createElementNS(NS, "g");
        group.setAttribute("class", "draggable-layer");
        group.setAttribute("data-uid", inst.uid);
        group.setAttribute("data-category", inst.category);
        group.setAttribute("transform", `translate(${inst.dx} ${inst.dy})`);
        const image = document.createElementNS(NS, "image");
        image.setAttribute("href", item.src);
        image.setAttribute("x", item.x);
        image.setAttribute("y", item.y);
        image.setAttribute("width", item.width);
        image.setAttribute("height", item.height);
        image.setAttribute("preserveAspectRatio", "xMidYMid meet");
        image.setAttribute("pointer-events", "none");
        group.appendChild(image);
        wearableLayerRoot.appendChild(group);
      });
    }

    function renderTabs() {
      tabsEl.innerHTML = "";
      CATEGORIES.forEach(category => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "tab";
        btn.textContent = category.label;
        btn.setAttribute("aria-selected", String(state.activeCategory === category.id));
        btn.addEventListener("click", () => {
          state.activeCategory = category.id;
          renderAll();
        });
        tabsEl.appendChild(btn);
      });
    }

    function renderItems() {
      itemsEl.innerHTML = "";
      if (state.activeCategory === "background") {
        BACKGROUNDS.forEach(bg => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "item-btn background-thumb";
          btn.setAttribute("aria-label", bg.name);
          if (state.selectedBackground === bg.id) btn.classList.add("active");
          const img = document.createElement("img");
          img.src = bg.thumb || bg.src;
          img.alt = "";
          btn.appendChild(img);
          btn.addEventListener("click", () => {
            state.selectedBackground = bg.id;
            renderAll();
          });
          itemsEl.appendChild(btn);
        });
        return;
      }

      const list = DATA[state.activeCategory] || [];
      list.forEach(item => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "item-btn";
        btn.setAttribute("aria-label", item.name);
        if (state.activeCategory === "accessory") {
          if (item.id === "none") {
            if (!state.instances.some(inst => inst.category === "accessory")) btn.classList.add("active");
          } else if (state.instances.some(inst => inst.category === "accessory" && inst.itemId === item.id)) {
            btn.classList.add("active");
          }
        } else if (state.selected[state.activeCategory] === item.id) {
          btn.classList.add("active");

        const img = document.createElement("img");
        img.src = item.thumb || item.src;
        img.alt = "";
        btn.appendChild(img);
        btn.addEventListener("click", () => selectItem(state.activeCategory, item.id));
        itemsEl.appendChild(btn);
      });

    function selectItem(category, itemId) {
      if (category === "accessory") {
        if (itemId === "none") {
          removeInstancesByCategory("accessory");
          state.activeInstanceId = null;
        } else {
          const inst = createInstance(category, itemId);

        const inst = createInstance(category, itemId);
        if (inst) {

          state.activeInstanceId = inst.uid;

      alphaCanvasCache.set(src, promise);
      return promise;

      if (localX < item.x || localY < item.y || localX > item.x + item.width || localY > item.y + item.height) return false;

    avatarSvg.addEventListener("pointerdown", async event => {
      const point = svgPoint(event);
      const inst = await findTopInstanceAtPoint(point);
      if (!inst) return;
      event.preventDefault();
      dragState = {
        uid: inst.uid,
        pointerId: event.pointerId,
        startX: point.x,
        startY: point.y,
        baseX: inst.dx,
        baseY: inst.dy
      };
      state.activeInstanceId = inst.uid;
      state.activeCategory = inst.category;
      deleteZone.classList.add("show");
      renderTabs();
      renderItems();
      try { avatarSvg.setPointerCapture(event.pointerId); } catch (error) {}
    });

    window.addEventListener("pointermove", event => {
      if (!dragState) return;
      event.preventDefault();
      const inst = state.instances.find(item => item.uid === dragState.uid);
      if (!inst) return;
      const point = svgPoint(event);
      inst.dx = dragState.baseX + point.x - dragState.startX;
      inst.dy = dragState.baseY + point.y - dragState.startY;
      updateDeleteZone(event.clientX, event.clientY);
      renderStage();
    }, { passive: false });

    function finishDrag(event) {
      if (!dragState) return;
      const shouldDelete = event && updateDeleteZone(event.clientX, event.clientY);
      const uid = dragState.uid;
      dragState = null;
      deleteZone.classList.remove("show", "hot");
      if (shouldDelete) {
        removeInstance(uid);
        showToast("삭제했어요.");
        return;
      }
      renderStage();
    }

    window.addEventListener("pointerup", finishDrag);
    window.addEventListener("pointercancel", finishDrag);

    function reset() {
      state.selectedBackground = BACKGROUNDS[0]?.id || "";
      state.selected = { outerwear: "none", top: "none", bottom: "none", shoes: "none" };
      state.instances = [];
      state.activeInstanceId = null;
      renderAll();
    }

    function randomPick() {
      reset();
      if (BACKGROUNDS.length) state.selectedBackground = BACKGROUNDS[Math.floor(Math.random() * BACKGROUNDS.length)].id;
      ["outerwear", "top", "bottom", "shoes"].forEach(category => {
        const list = (DATA[category] || []).filter(item => item.id !== "none");
        if (list.length && Math.random() > 0.18) {
          const item = list[Math.floor(Math.random() * list.length)];
          state.selected[category] = item.id;
          const inst = createInstance(category, item.id);
          if (inst) state.instances.push(inst);
        }
      });
      const accList = (DATA.accessory || []).filter(item => item.id !== "none");
      const accCount = Math.min(accList.length, Math.floor(Math.random() * 3));
      for (let i = 0; i < accCount; i++) {
        const item = accList[Math.floor(Math.random() * accList.length)];
        const inst = createInstance("accessory", item.id);
        if (inst) state.instances.push(inst);
      }
      renderAll();
    }

    function resolveAssetSrc(src) {
      if (!src) return "";
      if (src.startsWith("data:") || src.startsWith("blob:")) return src;
      return new URL(src, window.location.href).href;
    }

    function loadDrawableImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.decoding = "async";
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error(`이미지를 불러오지 못했어요: ${src}`));
        img.src = resolveAssetSrc(src);
      });
    }

    function drawImageCover(ctx, img, x, y, width, height) {
      const imageWidth = img.naturalWidth || img.width;
      const imageHeight = img.naturalHeight || img.height;
      const scale = Math.max(width / imageWidth, height / imageHeight);
      const cropWidth = width / scale;
      const cropHeight = height / scale;
      const cropX = (imageWidth - cropWidth) / 2;
      const cropY = (imageHeight - cropHeight) / 2;
      ctx.drawImage(img, cropX, cropY, cropWidth, cropHeight, x, y, width, height);
    }

    function drawImageContain(ctx, img, x, y, width, height) {
      const imageWidth = img.naturalWidth || img.width;
      const imageHeight = img.naturalHeight || img.height;
      const scale = Math.min(width / imageWidth, height / imageHeight);
      const drawWidth = imageWidth * scale;
      const drawHeight = imageHeight * scale;
      const drawX = x + (width - drawWidth) / 2;
      const drawY = y + (height - drawHeight) / 2;
      ctx.drawImage(img, drawX, drawY, drawWidth, drawHeight);
    }

    function saveCanvasAsPng(canvas, filename) {
      if (canvas.toBlob) {
        canvas.toBlob(blob => {
          if (!blob) {
            showToast("저장 중 오류가 났어요.");
            return;
          }
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.download = filename;
          link.href = url;
          document.body.appendChild(link);
          link.click();
          link.remove();
          window.setTimeout(() => URL.revokeObjectURL(url), 1000);
        }, "image/png");
      } else {
        const link = document.createElement("a");
        link.download = filename;
        link.href = canvas.toDataURL("image/png");
        document.body.appendChild(link);
        link.click();
        link.remove();
      }
    }

    async function downloadPng() {
      try {
        const canvas = document.createElement("canvas");
        canvas.width = 1580;
        canvas.height = 2270;
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const bg = getBackground(state.selectedBackground);
        if (bg && bg.src) {
          const bgImage = await loadDrawableImage(bg.src);
          drawImageCover(ctx, bgImage, 0, 0, 1580, 2270);
        } else {
          ctx.fillStyle = (bg && bg.color) || "#fff8e8";
          ctx.fillRect(0, 0, 1580, 2270);
        }

        const baseSrc = document.getElementById("baseCharacter")?.getAttribute("href") || "";
        if (baseSrc) {
          const baseImage = await loadDrawableImage(baseSrc);
          drawImageContain(ctx, baseImage, 0, 0, 1580, 2270);
        }

        for (const inst of sortedInstances()) {
          const item = getItem(inst.category, inst.itemId);
          if (!item || !item.src) continue;
          const itemImage = await loadDrawableImage(item.src);
          ctx.drawImage(itemImage, item.x + inst.dx, item.y + inst.dy, item.width, item.height);
        }

        saveCanvasAsPng(canvas, "wheen_gu-dressup.png");
      } catch (error) {
        console.warn(error);
        showToast("저장 중 오류가 났어요.");
      }
    }

    function updateSpeaker() {
      const playing = !bgmAudio.paused;
      speakerBtn.classList.toggle("is-playing", playing);
      speakerBtn.setAttribute("aria-label", playing ? "배경음악 끄기" : "배경음악 켜기");
      speakerIconPath.setAttribute("d", playing ? speakerOnPath : speakerOffPath);
    }

    async function playBgm() {
      if (!bgmAudio.src) return false;
      try {
        bgmAudio.muted = false;
        bgmAudio.volume = 0.36;
        await bgmAudio.play();
        updateSpeaker();
        return true;
      } catch (error) {
        updateSpeaker();
        return false;
      }
    }

    function pauseBgm() {
      bgmAudio.pause();
      updateSpeaker();
    }

    async function enterGame() {
      document.body.classList.add("game-started");
      bgmWanted = true;
      await playBgm();
    }

    document.addEventListener("pointerdown", event => {
      if (event.target.closest("button, .instagram-link")) playClickSfx();
    }, true);
    document.addEventListener("keydown", event => {
      if ((event.key === "Enter" || event.key === " ") && event.target.closest("button, .instagram-link")) {
        playClickSfx();
      }
    }, true);

    startGameBtn.addEventListener("click", async event => {
      event.preventDefault();
      await enterGame();
    });

    speakerBtn.addEventListener("pointerdown", event => {
      event.stopPropagation();
    });
    speakerBtn.addEventListener("click", async event => {
      event.preventDefault();
      event.stopPropagation();
      bgmWanted = bgmAudio.paused;
      if (bgmWanted) await playBgm(); else pauseBgm();
    });
    bgmAudio.addEventListener("play", updateSpeaker);
    bgmAudio.addEventListener("pause", updateSpeaker);

    document.getElementById("randomBtn").addEventListener("click", randomPick);
    document.getElementById("resetBtn").addEventListener("click", reset);
    document.getElementById("downloadBtn").addEventListener("click", downloadPng);

    renderAll();
    updateSpeaker();
  </script>
</body>
</html>
